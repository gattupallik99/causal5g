global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    project: 'causal5g'

scrape_configs:

  - job_name: 'free5gc-nrf'
    static_configs:
      - targets: ['10.100.0.10:8000']
        labels:
          nf: 'nrf'

  - job_name: 'free5gc-amf'
    static_configs:
      - targets: ['10.100.0.11:8000']
        labels:
          nf: 'amf'

  - job_name: 'free5gc-smf'
    static_configs:
      - targets: ['10.100.0.12:8000']
        labels:
          nf: 'smf'

  - job_name: 'free5gc-upf'
    static_configs:
      - targets: ['10.100.0.13:8000']
        labels:
          nf: 'upf'

  - job_name: 'free5gc-pcf'
    static_configs:
      - targets: ['10.100.0.14:8000']
        labels:
          nf: 'pcf'

  - job_name: 'free5gc-udm'
    static_configs:
      - targets: ['10.100.0.15:8000']
        labels:
          nf: 'udm'

  - job_name: 'free5gc-ausf'
    static_configs:
      - targets: ['10.100.0.17:8000']
        labels:
          nf: 'ausf'

  - job_name: 'causal5g-api'
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          component: 'causal-engine'
