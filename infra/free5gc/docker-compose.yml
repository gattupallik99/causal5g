name: causal5g-core

networks:
  causal5g-net:
    external: true

volumes:
  dbdata:

services:

  db:
    container_name: causal5g-mongodb
    image: mongo:4.4
    command: mongod --port 27017
    expose:
      - "27017"
    volumes:
      - dbdata:/data/db
    networks:
      causal5g-net:
        aliases:
          - db
    restart: unless-stopped

  free5gc-upf:
    container_name: causal5g-upf
    image: free5gc/upf:v4.2.0
    command: bash -c "./upf-iptables.sh && ./upf -c ./config/upfcfg.yaml"
    volumes:
      - ./config/upfcfg.yaml:/free5gc/config/upfcfg.yaml
      - ./config/upf-iptables.sh:/free5gc/upf-iptables.sh
    cap_add:
      - NET_ADMIN
    networks:
      causal5g-net:
        aliases:
          - upf.free5gc.org
    restart: unless-stopped
    labels:
      - "causal5g.nf=upf"

  free5gc-nrf:
    container_name: causal5g-nrf
    image: free5gc/nrf:v4.2.0
    command: ./nrf -c ./config/nrfcfg.yaml
    expose:
      - "8000"
    ports:
      - "8000:8000"
      - "9091:9091"
    volumes:
      - ./config/nrfcfg.yaml:/free5gc/config/nrfcfg.yaml
      - ./cert:/free5gc/cert
    environment:
      DB_URI: mongodb://db/free5gc
      GIN_MODE: release
    networks:
      causal5g-net:
        aliases:
          - nrf.free5gc.org
    depends_on:
      - db
    restart: unless-stopped
    labels:
      - "causal5g.nf=nrf"

  free5gc-amf:
    container_name: causal5g-amf
    image: free5gc/amf:v4.2.0
    command: ./amf -c ./config/amfcfg.yaml
    expose:
      - "8000"
    ports:
      - "8001:8000"
      - "9092:9091"
    volumes:
      - ./config/amfcfg.yaml:/free5gc/config/amfcfg.yaml
      - ./cert:/free5gc/cert
    environment:
      GIN_MODE: release
    networks:
      causal5g-net:
        aliases:
          - amf.free5gc.org
    depends_on:
      - free5gc-nrf
    restart: unless-stopped
    labels:
      - "causal5g.nf=amf"

  free5gc-smf:
    container_name: causal5g-smf
    image: free5gc/smf:v4.2.0
    command: ./smf -c ./config/smfcfg.yaml -u ./config/uerouting.yaml
    expose:
      - "8000"
    ports:
      - "8002:8000"
      - "9093:9091"
    volumes:
      - ./config/smfcfg.yaml:/free5gc/config/smfcfg.yaml
      - ./config/uerouting.yaml:/free5gc/config/uerouting.yaml
      - ./cert:/free5gc/cert
    environment:
      GIN_MODE: release
    networks:
      causal5g-net:
        aliases:
          - smf.free5gc.org
    depends_on:
      - free5gc-nrf
      - free5gc-upf
    restart: unless-stopped
    labels:
      - "causal5g.nf=smf"

  free5gc-ausf:
    container_name: causal5g-ausf
    image: free5gc/ausf:v4.2.0
    command: ./ausf -c ./config/ausfcfg.yaml
    expose:
      - "8000"
    ports:
      - "8006:8000"
      - "9097:9091"
    volumes:
      - ./config/ausfcfg.yaml:/free5gc/config/ausfcfg.yaml
      - ./cert:/free5gc/cert
    environment:
      GIN_MODE: release
    networks:
      causal5g-net:
        aliases:
          - ausf.free5gc.org
    depends_on:
      - free5gc-nrf
    restart: unless-stopped
    labels:
      - "causal5g.nf=ausf"

  free5gc-udm:
    container_name: causal5g-udm
    image: free5gc/udm:v4.2.0
    command: ./udm -c ./config/udmcfg.yaml
    expose:
      - "8000"
    ports:
      - "8004:8000"
      - "9095:9091"
    volumes:
      - ./config/udmcfg.yaml:/free5gc/config/udmcfg.yaml
      - ./cert:/free5gc/cert
    environment:
      GIN_MODE: release
    networks:
      causal5g-net:
        aliases:
          - udm.free5gc.org
    depends_on:
      - free5gc-nrf
    restart: unless-stopped
    labels:
      - "causal5g.nf=udm"

  free5gc-udr:
    container_name: causal5g-udr
    image: free5gc/udr:v4.2.0
    command: ./udr -c ./config/udrcfg.yaml
    expose:
      - "8000"
    ports:
      - "8005:8000"
      - "9096:9091"
    volumes:
      - ./config/udrcfg.yaml:/free5gc/config/udrcfg.yaml
      - ./cert:/free5gc/cert
    environment:
      DB_URI: mongodb://db/free5gc
      GIN_MODE: release
    networks:
      causal5g-net:
        aliases:
          - udr.free5gc.org
    depends_on:
      - free5gc-nrf
      - db
    restart: unless-stopped
    labels:
      - "causal5g.nf=udr"

  free5gc-pcf:
    container_name: causal5g-pcf
    image: free5gc/pcf:v4.2.0
    command: ./pcf -c ./config/pcfcfg.yaml
    expose:
      - "8000"
    ports:
      - "8003:8000"
      - "9094:9091"
    volumes:
      - ./config/pcfcfg.yaml:/free5gc/config/pcfcfg.yaml
      - ./cert:/free5gc/cert
    environment:
      GIN_MODE: release
    networks:
      causal5g-net:
        aliases:
          - pcf.free5gc.org
    depends_on:
      - free5gc-nrf
    restart: unless-stopped
    labels:
      - "causal5g.nf=pcf"

  free5gc-nssf:
    container_name: causal5g-nssf
    image: free5gc/nssf:v4.2.0
    command: ./nssf -c ./config/nssfcfg.yaml
    expose:
      - "8000"
    ports:
      - "8007:8000"
      - "9098:9091"
    volumes:
      - ./config/nssfcfg.yaml:/free5gc/config/nssfcfg.yaml
      - ./cert:/free5gc/cert
    environment:
      GIN_MODE: release
    networks:
      causal5g-net:
        aliases:
          - nssf.free5gc.org
    depends_on:
      - free5gc-nrf
    restart: unless-stopped
    labels:
      - "causal5g.nf=nssf"

  free5gc-webui:
    container_name: causal5g-webui
    image: free5gc/webui:v4.2.0
    command: ./webui -c ./config/webuicfg.yaml
    volumes:
      - ./config/webuicfg.yaml:/free5gc/config/webuicfg.yaml
    environment:
      GIN_MODE: release
      WEBUI_REGISTER_IP: 0.0.0.0
    ports:
      - "5003:5000"
      - "5001:5001"
    networks:
      causal5g-net:
        aliases:
          - webui.free5gc.org
    depends_on:
      - free5gc-nrf
      - db
    restart: unless-stopped


  # Port exposure for MTIE telemetry scraping
  # Added after free5gc-webui service
