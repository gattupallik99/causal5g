<svg viewBox="0 0 860 700" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="860" height="700" fill="white"/>
  <text x="430" y="28" text-anchor="middle" font-size="13" font-weight="bold">FIG. 2 — BI-LEVEL CAUSAL DAG STRUCTURE</text>

  <!-- ═══════ LEVEL 1: NF-Layer DAG ═══════ -->
  <rect x="40" y="45" width="780" height="240" fill="none" stroke="black" stroke-width="2"/>
  <text x="55" y="65" font-size="11" font-weight="bold">LEVEL 1 — NF-Layer DAG  (First-Level DAG 200)</text>
  <text x="55" y="80" font-size="9" font-style="italic">Granger-causal edges among Network Functions</text>

  <!-- NF nodes (ellipses) -->
  <!-- NRF (200a) -->
  <ellipse cx="430" cy="155" rx="48" ry="28" fill="none" stroke="black" stroke-width="2"/>
  <text x="430" y="151" text-anchor="middle" font-size="12" font-weight="bold">NRF</text>
  <text x="430" y="167" text-anchor="middle" font-size="10">200a</text>

  <!-- AMF (200b) -->
  <ellipse cx="200" cy="230" rx="48" ry="28" fill="none" stroke="black" stroke-width="2"/>
  <text x="200" y="226" text-anchor="middle" font-size="12" font-weight="bold">AMF</text>
  <text x="200" y="242" text-anchor="middle" font-size="10">200b</text>

  <!-- SMF (200c) -->
  <ellipse cx="660" cy="230" rx="48" ry="28" fill="none" stroke="black" stroke-width="2"/>
  <text x="660" y="226" text-anchor="middle" font-size="12" font-weight="bold">SMF</text>
  <text x="660" y="242" text-anchor="middle" font-size="10">200c</text>

  <!-- PCF (200d) — highlighted as candidate root cause -->
  <ellipse cx="430" cy="248" rx="48" ry="28" fill="none" stroke="black" stroke-width="3"/>
  <text x="430" y="244" text-anchor="middle" font-size="12" font-weight="bold">PCF</text>
  <text x="430" y="260" text-anchor="middle" font-size="10">200d ★</text>

  <!-- UDM (200e) -->
  <ellipse cx="100" cy="155" rx="48" ry="28" fill="none" stroke="black" stroke-width="2"/>
  <text x="100" y="151" text-anchor="middle" font-size="12" font-weight="bold">UDM</text>
  <text x="100" y="167" text-anchor="middle" font-size="10">200e</text>

  <!-- Causal edges (L1) -->
  <!-- NRF → AMF -->
  <line x1="388" y1="165" x2="240" y2="218" stroke="black" stroke-width="1.5" marker-end="url(#arrd)"/>
  <!-- NRF → SMF -->
  <line x1="472" y1="165" x2="620" y2="218" stroke="black" stroke-width="1.5" marker-end="url(#arrd)"/>
  <!-- PCF → AMF -->
  <line x1="386" y1="256" x2="244" y2="234" stroke="black" stroke-width="2" marker-end="url(#arrd)"/>
  <!-- PCF → SMF -->
  <line x1="474" y1="256" x2="616" y2="234" stroke="black" stroke-width="2" marker-end="url(#arrd)"/>
  <!-- UDM → AMF -->
  <line x1="144" y1="165" x2="162" y2="208" stroke="black" stroke-width="1.5" marker-end="url(#arrd)"/>

  <!-- Score annotations -->
  <text x="560" y="150" font-size="9" font-style="italic">S_NRF = 0.51</text>
  <text x="560" y="165" font-size="9" font-style="italic">S_AMF = 0.50</text>
  <text x="560" y="180" font-size="9" font-weight="bold">S_PCF = 1.01 ← highest</text>
  <text x="560" y="195" font-size="9" font-style="italic">S_SMF = 0.50</text>
  <text x="560" y="210" font-size="9" font-style="italic">S_UDM = 0.50</text>

  <text x="55" y="275" font-size="9">★ = Candidate root cause NF (highest composite score S_i) passed to Level 2</text>

  <!-- ═══════ BOUNDARY LINE ═══════ -->
  <line x1="40" y1="300" x2="820" y2="300" stroke="black" stroke-width="2" stroke-dasharray="10,5"/>
  <text x="430" y="316" text-anchor="middle" font-size="10" font-style="italic">── Level-1 / Level-2 Boundary ──</text>

  <!-- ═══════ LEVEL 2: Slice Sub-DAGs ═══════ -->
  <text x="55" y="340" font-size="11" font-weight="bold">LEVEL 2 — Slice Sub-DAGs  (Second-Level Slice Sub-DAGs 210, 220, 230)</text>

  <!-- ─── eMBB Slice 210 ─── -->
  <rect x="50" y="355" width="220" height="170" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="160" y="372" text-anchor="middle" font-size="11" font-weight="bold">eMBB Slice  210</text>
  <!-- PCF present -->
  <ellipse cx="120" cy="430" rx="38" ry="22" fill="none" stroke="black" stroke-width="2"/>
  <text x="120" y="426" text-anchor="middle" font-size="11" font-weight="bold">PCF</text>
  <text x="120" y="442" text-anchor="middle" font-size="9">210a  w=0.35</text>
  <!-- AMF present -->
  <ellipse cx="220" cy="470" rx="38" ry="22" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="220" y="466" text-anchor="middle" font-size="11">AMF</text>
  <text x="220" y="482" text-anchor="middle" font-size="9">210b</text>
  <!-- Edge PCF→AMF -->
  <line x1="152" y1="440" x2="188" y2="456" stroke="black" stroke-width="1.5" marker-end="url(#arrd)"/>
  <text x="100" y="500" font-size="9">PCF present: nf_present=True</text>
  <text x="100" y="514" font-size="9">SB contribution: 1/3</text>

  <!-- ─── mIoT Slice 220 ─── -->
  <rect x="320" y="355" width="220" height="170" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="430" y="372" text-anchor="middle" font-size="11" font-weight="bold">mIoT Slice  220</text>
  <!-- PCF ABSENT — shown with dashed border -->
  <ellipse cx="380" cy="430" rx="38" ry="22" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="380" y="426" text-anchor="middle" font-size="11">PCF</text>
  <text x="380" y="442" text-anchor="middle" font-size="9">w=0  ABSENT</text>
  <!-- UDM present -->
  <ellipse cx="480" cy="430" rx="38" ry="22" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="480" y="426" text-anchor="middle" font-size="11">UDM</text>
  <text x="480" y="442" text-anchor="middle" font-size="9">220a</text>
  <!-- No edge (PCF absent) -->
  <text x="330" y="490" font-size="9">PCF absent: nf_present=False</text>
  <text x="330" y="504" font-size="9">SB contribution: 0</text>
  <text x="330" y="516" font-size="9" font-weight="bold">mIoT unaffected ← key proof</text>

  <!-- ─── URLLC Slice 230 ─── -->
  <rect x="590" y="355" width="220" height="170" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="700" y="372" text-anchor="middle" font-size="11" font-weight="bold">URLLC Slice  230</text>
  <!-- PCF present -->
  <ellipse cx="660" cy="430" rx="38" ry="22" fill="none" stroke="black" stroke-width="2"/>
  <text x="660" y="426" text-anchor="middle" font-size="11" font-weight="bold">PCF</text>
  <text x="660" y="442" text-anchor="middle" font-size="9">230a  w=0.29</text>
  <!-- SMF present -->
  <ellipse cx="760" cy="470" rx="38" ry="22" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="760" y="466" text-anchor="middle" font-size="11">SMF</text>
  <text x="760" y="482" text-anchor="middle" font-size="9">230b</text>
  <!-- Edge PCF→SMF -->
  <line x1="692" y1="440" x2="728" y2="456" stroke="black" stroke-width="1.5" marker-end="url(#arrd)"/>
  <text x="610" y="500" font-size="9">PCF present: nf_present=True</text>
  <text x="610" y="514" font-size="9">SB contribution: 1/3</text>

  <!-- Slice Breadth Summary Box -->
  <rect x="50" y="545" width="760" height="70" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="430" y="565" text-anchor="middle" font-size="11" font-weight="bold">SLICE BREADTH COMPUTATION (pcf_timeout scenario)</text>
  <text x="430" y="583" text-anchor="middle" font-size="11">SB = |{slices with PCF path_weight &gt; 0}| / |{all slices}| = 2 / 3 = 0.667</text>
  <text x="430" y="601" text-anchor="middle" font-size="11">Isolation Type = "slice-isolated"  (SB &lt; 1.0)</text>
  <text x="430" y="617" text-anchor="middle" font-size="10" font-style="italic">cf. NRF crash: SB = 3/3 = 1.000, Isolation Type = "infrastructure-wide"</text>

  <defs>
    <marker id="arrd" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="black"/>
    </marker>
  </defs>
</svg>
