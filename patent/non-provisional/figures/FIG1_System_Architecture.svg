<svg viewBox="0 0 900 680" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- USPTO-style: black & white, reference numerals -->
  <rect width="900" height="680" fill="white" stroke="none"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="13" font-weight="bold">FIG. 1 — SYSTEM ARCHITECTURE (100)</text>

  <!-- ── 5G Network Layer (top) ──────────────────────────────────── -->
  <rect x="60" y="55" width="780" height="80" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="90" y="73" font-size="10" font-style="italic">5G Network Layer</text>
  <!-- NFs -->
  <rect x="100" y="82" width="80" height="36" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="140" y="105" text-anchor="middle" font-size="11">AMF</text>
  <rect x="210" y="82" width="80" height="36" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="250" y="105" text-anchor="middle" font-size="11">SMF</text>
  <rect x="320" y="82" width="80" height="36" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="360" y="105" text-anchor="middle" font-size="11">PCF</text>
  <rect x="430" y="82" width="80" height="36" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="470" y="105" text-anchor="middle" font-size="11">UDM</text>
  <rect x="540" y="82" width="80" height="36" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="580" y="105" text-anchor="middle" font-size="11">NRF</text>
  <!-- Slices box -->
  <rect x="660" y="82" width="150" height="36" fill="none" stroke="black" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="735" y="105" text-anchor="middle" font-size="10">eMBB / mIoT / URLLC</text>

  <!-- ── MTIE 110 ──────────────────────────────────────────────── -->
  <rect x="200" y="175" width="500" height="52" rx="4" fill="none" stroke="black" stroke-width="2"/>
  <text x="450" y="196" text-anchor="middle" font-size="12" font-weight="bold">MULTI-SOURCE TELEMETRY INGESTION ENGINE</text>
  <text x="450" y="214" text-anchor="middle" font-size="11">(MTIE)  110</text>
  <!-- Ring buffer annotation -->
  <text x="720" y="203" font-size="9" font-style="italic">Ring Buffer</text>

  <!-- Arrow: 5G → MTIE -->
  <line x1="450" y1="136" x2="450" y2="175" stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="460" y="160" font-size="9">telemetry</text>

  <!-- ── CIE 120 ──────────────────────────────────────────────── -->
  <rect x="60" y="270" width="220" height="52" rx="4" fill="none" stroke="black" stroke-width="2"/>
  <text x="170" y="290" text-anchor="middle" font-size="11" font-weight="bold">CAUSAL INFERENCE ENGINE</text>
  <text x="170" y="308" text-anchor="middle" font-size="11">(CIE)  120</text>

  <!-- Arrow MTIE → CIE -->
  <line x1="300" y1="227" x2="170" y2="270" stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── DCGM 130 ─────────────────────────────────────────────── -->
  <rect x="60" y="365" width="220" height="52" rx="4" fill="none" stroke="black" stroke-width="2"/>
  <text x="170" y="385" text-anchor="middle" font-size="11" font-weight="bold">DYNAMIC CAUSAL GRAPH MGR</text>
  <text x="170" y="403" text-anchor="middle" font-size="11">(DCGM)  130</text>

  <!-- Arrow CIE → DCGM -->
  <line x1="170" y1="322" x2="170" y2="365" stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── RCSM 140 ─────────────────────────────────────────────── -->
  <rect x="60" y="460" width="220" height="52" rx="4" fill="none" stroke="black" stroke-width="2"/>
  <text x="170" y="480" text-anchor="middle" font-size="11" font-weight="bold">ROOT CAUSE SCORING MODULE</text>
  <text x="170" y="498" text-anchor="middle" font-size="11">(RCSM)  140</text>

  <!-- Arrow DCGM → RCSM -->
  <line x1="170" y1="417" x2="170" y2="460" stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Slice Ensemble Attributor 150 ──────────────────────────── -->
  <rect x="340" y="365" width="220" height="52" rx="4" fill="none" stroke="black" stroke-width="2"/>
  <text x="450" y="385" text-anchor="middle" font-size="11" font-weight="bold">SLICE ENSEMBLE ATTRIBUTOR</text>
  <text x="450" y="403" text-anchor="middle" font-size="11">150</text>

  <!-- Arrow RCSM → Slice Ens (candidate NF) -->
  <line x1="280" y1="486" x2="340" y2="406" stroke="black" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <text x="300" y="458" font-size="9">candidate NF</text>

  <!-- Arrow MTIE → Slice Ens (slice topology) -->
  <line x1="490" y1="227" x2="470" y2="365" stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="495" y="300" font-size="9">slice topology</text>

  <!-- ── FRG 160 ──────────────────────────────────────────────── -->
  <rect x="340" y="460" width="220" height="52" rx="4" fill="none" stroke="black" stroke-width="2"/>
  <text x="450" y="480" text-anchor="middle" font-size="11" font-weight="bold">FAULT REPORT GENERATOR</text>
  <text x="450" y="498" text-anchor="middle" font-size="11">(FRG)  160</text>

  <!-- Arrow RCSM → FRG -->
  <line x1="280" y1="490" x2="340" y2="490" stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Arrow Slice Ens → FRG -->
  <line x1="450" y1="417" x2="450" y2="460" stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── RAE 170 ──────────────────────────────────────────────── -->
  <rect x="620" y="460" width="220" height="52" rx="4" fill="none" stroke="black" stroke-width="2"/>
  <text x="730" y="480" text-anchor="middle" font-size="11" font-weight="bold">REMEDIATION ACTION ENGINE</text>
  <text x="730" y="498" text-anchor="middle" font-size="11">(RAE)  170  [confidence-gated]</text>

  <!-- Arrow FRG → RAE -->
  <line x1="560" y1="486" x2="620" y2="486" stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="576" y="480" font-size="9">attribution</text>

  <!-- Arrow RAE → 5G Network (execute action) -->
  <line x1="730" y1="460" x2="750" y2="136" stroke="black" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <text x="755" y="310" font-size="9">remediation</text>
  <text x="755" y="322" font-size="9">action</text>

  <!-- Arrow RAE → DCGM (recalibration) -->
  <line x1="620" y1="500" x2="280" y2="400" stroke="black" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <text x="420" y="470" font-size="9" font-style="italic">recalibration (outcome telemetry)</text>

  <!-- REST API annotation -->
  <rect x="340" y="530" width="220" height="24" rx="3" fill="none" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="450" y="547" text-anchor="middle" font-size="10" font-style="italic">REST API: /rca  /inject  /health</text>

  <!-- arrowhead marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="black"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="60" y="590" width="780" height="70" fill="none" stroke="black" stroke-width="1"/>
  <text x="80" y="610" font-size="10" font-weight="bold">Reference Numerals:</text>
  <text x="80" y="626" font-size="9">100 = System  110 = MTIE  120 = CIE  130 = DCGM  140 = RCSM  150 = Slice Ensemble Attributor  160 = FRG  170 = RAE</text>
  <line x1="80" y1="635" x2="130" y2="635" stroke="black" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="140" y="639" font-size="9">= data flow (optional / recalibration)</text>
  <line x1="280" y1="635" x2="330" y2="635" stroke="black" stroke-width="2"/>
  <text x="340" y="639" font-size="9">= primary data flow</text>
</svg>
